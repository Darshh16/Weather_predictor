version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - hermes
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  hermes:
    image: ghcr.io/nousresearch/hermes-server:latest
    ports:
      - "8001:8001"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MODEL=meta-llama/llama-3.1-8b-instruct:free
    restart: unless-stopped
