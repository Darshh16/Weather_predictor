<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
    <div class="glass-card p-5">
        <p class="text-xs text-gray-400 uppercase tracking-wider">Balance</p>
        <p class="text-2xl font-bold text-white mt-1">${{ "%.2f"|format(portfolio.balance) }}</p>
    </div>
    <div class="glass-card p-5">
        <p class="text-xs text-gray-400 uppercase tracking-wider">Total P/L</p>
        <p class="text-2xl font-bold mt-1 {% if portfolio.total_pnl >= 0 %}text-emerald-400{% else %}text-red-400{% endif %}">
            ${{ "%.2f"|format(portfolio.total_pnl) }}</p>
    </div>
    <div class="glass-card p-5">
        <p class="text-xs text-gray-400 uppercase tracking-wider">Win Rate</p>
        <p class="text-2xl font-bold text-cyan-400 mt-1">{{ "%.1f"|format(portfolio.win_rate) }}%</p>
    </div>
    <div class="glass-card p-5">
        <p class="text-xs text-gray-400 uppercase tracking-wider">Open Trades</p>
        <p class="text-2xl font-bold text-amber-400 mt-1">{{ portfolio.open_trades }}</p>
    </div>
    <div class="glass-card p-5">
        <p class="text-xs text-gray-400 uppercase tracking-wider">Active Hedges</p>
        <p class="text-2xl font-bold text-purple-400 mt-1">{{ portfolio.recent_hedges|length }}</p>
    </div>
</div>
